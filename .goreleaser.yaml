version: 2

project_name: tosscli

before:
  hooks:
    - go mod tidy

builds:
  - id: tosscli
    main: ./cmd/tosscli
    binary: tosscli
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/finetension/toss-openapi-cli/internal/version.Version={{ .Version }}
      - -X github.com/finetension/toss-openapi-cli/internal/version.Commit={{ .Commit }}
      - -X github.com/finetension/toss-openapi-cli/internal/version.Date={{ .Date }}
      - -X github.com/finetension/toss-openapi-cli/internal/version.BuiltBy=goreleaser

archives:
  - id: default
    ids:
      - tosscli
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^.*?feat(\\(.+\\))??!?:.+$"
      order: 0
    - title: Bug fixes
      regexp: "^.*?fix(\\(.+\\))??!?:.+$"
      order: 1
    - title: Documentation
      regexp: "^.*?docs(\\(.+\\))??!?:.+$"
      order: 2
    - title: Refactoring
      regexp: "^.*?refactor(\\(.+\\))??!?:.+$"
      order: 3
    - title: Maintenance
      regexp: "^.*?chore(\\(.+\\))??!?:.+$"
      order: 4
    - title: Other changes
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^ci:"
